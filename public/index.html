<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NVME">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="NVME - Creator platform with 55% revenue share, 10v10 battles, and no shadowbans">
<title>NVME - Creator Platform</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <div id="splash" class="splash">
    <div class="splash-logo">NVME</div>
    <div class="splash-sub">Creator Platform</div>
    <div class="splash-spinner"></div>
  </div>

  <div id="main" class="main hidden">
    <div id="page-container" class="page-container"></div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="home">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-page="discover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Discover</span>
      </button>
      <button class="nav-btn nav-btn-create" data-page="create">
        <div class="create-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
      </button>
      <button class="nav-btn" data-page="live">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
        <span>LIVE</span>
      </button>
      <button class="nav-btn" data-page="profile">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>
</div>

<script src="/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
