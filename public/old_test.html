<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVME.live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo{font-size:3rem;font-weight:700;color:#fff;letter-spacing:-0.03em;margin-bottom:0.5rem}
.logo span{color:#a78bfa}
.sub{color:#64748b;font-size:1.1rem;margin-bottom:2.5rem;text-align:center}
.status{display:flex;align-items:center;gap:0.5rem;background:#12121a;border:1px solid #1e1e2e;border-radius:20px;padding:0.5rem 1.2rem;font-size:0.85rem;color:#34d399;margin-bottom:2rem}
.pulse{width:7px;height:7px;border-radius:50%;background:#34d399;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:#7c3aed;color:#fff;padding:0.75rem 2rem;border-radius:10px;border:none;font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:3rem}
.btn:hover{background:#6d28d9}
.api-box{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:1.5rem;width:100%;max-width:500px}
.api-box h3{font-size:0.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.result{background:#0d1117;border:1px solid #1e1e2e;border-radius:8px;padding:1rem;font-family:monospace;font-size:0.8rem;color:#7ee787;min-height:50px;white-space:pre-wrap}
.test-btns{display:flex;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap}
.test-btn{background:#0f9d7b;color:#fff;padding:0.5rem 1rem;border-radius:7px;border:none;font-size:0.85rem;cursor:pointer}
.test-btn:hover{background:#34d399;color:#000}
footer{margin-top:3rem;color:#334155;font-size:0.8rem}
</style>
</head>
<body>
<div class="logo">NVME<span>.live</span></div>
<p class="sub">Infrastructure API — Online</p>
<div class="status"><span class="pulse"></span> All systems operational</div>
<button class="btn" onclick="testHealth()">Test API</button>
<div class="api-box">
  <h3>API Console</h3>
  <div class="test-btns">
    <button class="test-btn" onclick="testHealth()">Health</button>
    <button class="test-btn" onclick="testEndpoint()">Test</button>
  </div>
  <div class="result" id="result">// Click to test...</div>
</div>
<footer>NVME.live — BermudaLocals</footer>
<script>
async function testHealth(){
  document.getElementById('result').textContent='// Loading...';
  try{
    const r=await fetch('/api/health');
    const d=await r.json();
    document.getElementById('result').textContent=JSON.stringify(d,null,2);
  }catch(e){document.getElementById('result').textContent='// Error: '+e.message}
}
async function testEndpoint(){
  document.getElementById('result').textContent='// Loading...';
  try{
    const r=await fetch('/api/test');
    const d=await r.json();
    document.getElementById('result').textContent=JSON.stringify(d,null,2);
  }catch(e){document.getElementById('result').textContent='// Error: '+e.message}
}
</script>
</body>
</html>
